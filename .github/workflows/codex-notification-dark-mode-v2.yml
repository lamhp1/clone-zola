name: Apply notification switch and dark mode v2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-notification-dark-mode-v2.yml
      - scripts/codex-notification-dark-mode-v2.mjs

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply notification switch and dark mode
        run: node scripts/codex-notification-dark-mode-v2.mjs
      - name: Commit notification switch and dark mode
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/App.jsx frontend/src/NotificationWatcher.jsx frontend/src/styles.css frontend/src/notificationWatcher.css
          if git diff --cached --quiet; then
            echo "No UI changes to commit"
          else
            git commit -m "Add notification switch and dark mode"
            git push
          fi
