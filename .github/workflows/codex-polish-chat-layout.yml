name: Apply Codex chat layout polish

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-polish-chat-layout.yml
      - scripts/codex-polish-chat-layout.mjs

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply chat layout polish
        run: node scripts/codex-polish-chat-layout.mjs
      - name: Commit chat layout polish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/App.jsx frontend/src/styles.css
          if git diff --cached --quiet; then
            echo "No UI changes to commit"
          else
            git commit -m "Polish chat layout spacing"
            git push
          fi
